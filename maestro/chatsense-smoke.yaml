# ChatSense Android smoke flow (Maestro).
#
# Stage 7: the flow is self-contained. If the app opens on the onboarding /
# import screen, it taps "Try demo export", which loads the committed
# synthetic fixture through the normal import pipeline. No file pushing, no
# Android system file picker, and never a personal export.
#
# Run: maestro test maestro/chatsense-smoke.yaml
appId: com.thegreatparthicle.chatsense
---
- launchApp:
    stopApp: false
- extendedWaitUntil:
    visible: "ChatSense"
    timeout: 15000
# If the onboarding screen is showing, enter analysis via the synthetic demo.
- runFlow:
    when:
      visible: "(?i)try demo export"
    commands:
      - tapOn: "(?i)try demo export"
- extendedWaitUntil:
    visible: "(?i)what to notice"
    timeout: 30000
# Walk every tab through the bottom navigation and check the takeaway leads.
- tapOn: "Overview"
- assertVisible: "(?i)what to notice"
- tapOn: "Changes"
- assertVisible: "(?i)did the pattern move\\?"
- tapOn: "People"
- assertVisible: "(?i)who kept contact alive\\?"
- tapOn: "Rhythm"
- assertVisible: "(?i)what silence looked like"
# Bottom nav still works after the walk.
- tapOn: "Overview"
- assertVisible: "(?i)what to notice"
