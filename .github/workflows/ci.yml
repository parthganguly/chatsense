name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test JavaScript boundaries
        run: npm run test

      - name: Test parity fixtures
        run: npm run test:parity

      - name: Build web shell
        run: npm run build

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Test Python reference
        run: python -m pytest

      - name: Sync Android project
        run: npx cap sync android

      - name: Test Android
        working-directory: android
        run: ./gradlew test

      - name: Assemble Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug
